<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026 – PE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold2:#e0c96a;
  --green-dark:#062F15;--green-light:#1A7A3A;
  --red:#CC0001;--bg:#06200E;--surface:#0D3318;--surface2:#143D20;
  --text:#F0EDD8;--text2:#A8C4A0;--border:#1F5530;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
.load-badge{width:72px;height:72px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px}
.load-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:2px}
.load-sub{font-size:13px;color:var(--text2)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:9998;padding:16px;overflow-y:auto}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:360px}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-logo-badge{width:56px;height:56px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 10px}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:2px}
.auth-sub{font-size:12px;color:var(--text2);margin-top:2px}
.auth-tabs{display:flex;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:20px;gap:3px}
.auth-tab{flex:1;padding:8px;font-size:13px;font-weight:600;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--text2);transition:all .2s;font-family:'Inter',sans-serif}
.auth-tab.active{background:var(--gold);color:#000}
.form-group{margin-bottom:13px}
.form-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.form-input{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;transition:border-color .2s}
.form-input:focus{outline:none;border-color:var(--gold)}
.form-input.error{border-color:var(--red)}
.form-error{font-size:11px;color:#f87171;margin-top:4px;min-height:14px}
.btn-auth{width:100%;padding:12px;background:var(--gold);border:none;border-radius:8px;font-weight:700;font-size:14px;color:#000;cursor:pointer;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:1px;transition:all .2s;margin-top:4px}
.btn-auth:hover{background:var(--gold2)}
.btn-auth:disabled{opacity:.4;cursor:not-allowed}
.players-hint{background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--text2);line-height:1.6}
.players-hint strong{color:var(--text)}
.player-tag{display:inline-block;background:var(--border);border-radius:4px;padding:1px 7px;margin:2px;font-size:11px;color:var(--text);font-weight:600}

/* HEADER */
.header{background:var(--green-dark);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.header-inner{max-width:900px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.logo-wrap{display:flex;align-items:center;gap:9px}
.logo-badge{width:38px;height:38px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gold);letter-spacing:1px;line-height:1.1}
.logo-sub{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 11px;cursor:pointer;transition:border-color .2s}
.user-chip:hover{border-color:var(--gold)}
.user-av{width:26px;height:26px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;font-family:'Bebas Neue',sans-serif}
.user-nm{font-size:12px;font-weight:600}

/* SYNC BAR */
.sync-bar{text-align:center;padding:4px 10px;font-size:11px;font-weight:500;display:none}
.sync-bar.show{display:block}
.sync-bar.syncing{background:#0a2a0a;color:var(--text2)}
.sync-bar.live{background:#1a0a00;color:#fbbf24}
.sync-bar.offline{background:#2a0000;color:#f87171}
.sync-bar.ok{background:#0a1a0a;color:var(--text2)}

/* TABS */
.tabs{background:var(--surface);border-bottom:1px solid var(--border)}
.tabs-inner{max-width:900px;margin:0 auto;display:flex}
.tab-btn{flex:1;padding:12px 2px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:var(--text2);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;text-transform:uppercase;letter-spacing:.6px;transition:all .2s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.main{max-width:900px;margin:0 auto;padding:18px 13px 60px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:2px;margin-bottom:14px}

/* RANKING */
.podium-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px}
.podium-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 7px;text-align:center}
.podium-card.gold{border-color:var(--gold);background:#0f3a15}
.podium-card.silver{border-color:#b0b0b0}
.podium-card.bronze{border-color:#a0622a}
.p-medal{font-size:22px;display:block;margin-bottom:2px}
.p-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px}
.p-pts{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold)}
.p-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.rank-list{display:flex;flex-direction:column;gap:5px}
.rank-item{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:10px 13px;display:flex;align-items:center;gap:10px}
.rank-pos{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text2);width:24px;text-align:center}
.rank-name{font-weight:600;font-size:14px;flex:1}
.rank-pts{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold)}
.vidente-box{background:var(--surface);border:1px solid var(--gold);border-radius:11px;padding:13px;margin-top:13px}
.vidente-title{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--gold);letter-spacing:1.5px;margin-bottom:9px}
.vidente-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--surface2);border-radius:6px;margin-bottom:4px}
.vidente-count{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)}
.pts-legend{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px;margin-top:13px}
.pts-legend-title{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--gold);letter-spacing:1px;margin-bottom:9px}
.pts-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pts-row{display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border-radius:5px;padding:5px 9px;font-size:11px;gap:6px}
.pts-row span:first-child{color:var(--text2)}

/* JOGOS */
.filter-bar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);text-transform:uppercase;letter-spacing:.5px;transition:all .2s}
.filter-btn.active{background:var(--green-light);border-color:var(--gold);color:var(--text)}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:9px}
.match-hdr{background:var(--surface2);padding:6px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.match-date{font-size:10px;color:var(--text2)}
.match-stage{font-size:9px;color:var(--gold);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.match-body{padding:11px 13px}
.scoreboard{display:flex;align-items:center;justify-content:center;gap:8px}
.team-info{display:flex;flex-direction:column;align-items:center;gap:2px;width:82px}
.team-flag{font-size:30px;line-height:1}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;text-align:center;line-height:1.2}
.score-box{display:flex;align-items:center;gap:4px}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:38px;background:var(--bg);border:1px solid var(--border);border-radius:7px;width:48px;height:52px;display:flex;align-items:center;justify-content:center}
.score-div{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text2)}
.match-pals{padding:7px 13px 11px;border-top:1px solid var(--border)}
.pals-title{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:6px}
.pals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:4px}
.pal-item{background:var(--surface2);border-radius:5px;padding:6px 8px;display:flex;align-items:center;justify-content:space-between}
.pal-player{font-size:12px;font-weight:600}
.pal-score{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text2)}
.badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;text-transform:uppercase}
.badge-enc{background:#0a2a0a;color:#4ade80;border:1px solid #166534}
.badge-pend{background:#1c1800;color:#fbbf24;border:1px solid #854d0e}
.badge-live{background:#2a0000;color:#f87171;border:1px solid var(--red)}
.badge-fechado{background:#1a0a1a;color:#c084fc;border:1px solid #7e22ce}
.live-dot{display:inline-block;width:6px;height:6px;background:#f87171;border-radius:50%;margin-right:4px;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* PALPITAR */
.palpitar-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:11px}
.pal-hdr{background:var(--surface2);padding:8px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.pal-match-row{display:flex;align-items:center;justify-content:center;gap:9px;padding:11px 13px}
.pal-team{display:flex;flex-direction:column;align-items:center;gap:2px;width:70px}
.pal-flag{font-size:26px}
.pal-name{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;text-align:center;line-height:1.2}
.my-pal-section{padding:7px 13px 13px;border-top:1px solid var(--border)}
.my-pal-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:7px}
.my-pal-row{display:flex;align-items:center;gap:7px}
.sc-in{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:7px;width:44px;height:42px;text-align:center;-moz-appearance:textfield}
.sc-in::-webkit-outer-spin-button,.sc-in::-webkit-inner-spin-button{-webkit-appearance:none}
.sc-in:focus{outline:none;border-color:var(--gold)}
.sc-in:disabled{opacity:.4;cursor:not-allowed}
.sc-x{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text2)}
.btn-salvar{padding:8px 18px;background:var(--gold);border:none;border-radius:7px;font-weight:700;font-size:12px;color:#000;cursor:pointer;font-family:'Inter',sans-serif;text-transform:uppercase;transition:all .2s}
.btn-salvar:hover{background:var(--gold2)}
.btn-salvar:disabled{opacity:.4;cursor:not-allowed}
.locked-msg{display:flex;align-items:center;gap:6px;background:#1a0a1a;border:1px solid #7e22ce;border-radius:7px;padding:8px 12px;font-size:12px;color:#c084fc;margin-top:4px}
.countdown{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--gold);margin-left:auto}

/* ADMIN */
.admin-box{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:12px}
.admin-box-title{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);letter-spacing:1px;margin-bottom:11px}
.res-row{background:var(--surface2);border-radius:7px;padding:9px 11px;margin-bottom:7px}
.res-match-name{font-weight:600;font-size:12px;margin-bottom:7px}
.res-inputs{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.res-in{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:6px;width:44px;height:40px;text-align:center;-moz-appearance:textfield}
.res-in::-webkit-outer-spin-button,.res-in::-webkit-inner-spin-button{-webkit-appearance:none}
.res-in:focus{outline:none;border-color:var(--gold)}
.res-x{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text2)}
.res-team{font-size:11px;color:var(--text2)}
.btn-sm{padding:7px 14px;background:var(--gold);border:none;border-radius:6px;font-weight:700;font-size:11px;color:#000;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-sm:hover{background:var(--gold2)}
.btn-danger{padding:6px 11px;background:transparent;border:1px solid #991b1b;border-radius:5px;font-size:11px;font-weight:600;color:#f87171;cursor:pointer}
.btn-danger:hover{background:#2a0000}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.form-group-admin{display:flex;flex-direction:column;gap:3px}
.form-label-admin{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-input-admin,.form-select-admin{padding:7px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:'Inter',sans-serif}
.form-input-admin:focus,.form-select-admin:focus{outline:none;border-color:var(--gold)}
.form-select-admin option{background:#0D3318}
.full{grid-column:span 2}
.user-list-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:7px;padding:8px 11px;margin-bottom:5px}
.user-list-name{font-weight:600;font-size:13px}
.user-list-meta{font-size:10px;color:var(--text2)}
.admin-badge{font-size:10px;padding:2px 7px;background:#0a3a0a;color:#4ade80;border:1px solid #166534;border-radius:4px;font-weight:700}

/* UTILS */
.pts-exact{color:#4ade80}.pts-vg{color:#86efac}.pts-diff{color:#bbf7d0}
.pts-draw{color:#fde68a}.pts-lg{color:#fed7aa}.pts-win{color:#fca5a5}
.pts-almost{color:#f9a8d4}.pts-zero{color:var(--text2)}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:13px;line-height:1.7}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:#000;padding:10px 20px;border-radius:7px;font-weight:700;font-size:12px;z-index:9999;opacity:0;transition:all .3s;white-space:nowrap;max-width:92vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:#CC0001;color:#fff}

@media(max-width:480px){
  .podium-grid{gap:5px}.p-name{font-size:14px}.p-pts{font-size:22px}
  .scoreboard{gap:5px}.team-flag{font-size:24px}.score-num{font-size:30px;width:42px;height:46px}
  .form-grid{grid-template-columns:1fr}.full{grid-column:span 1}
  .pals-grid{grid-template-columns:1fr 1fr}
  .auth-card{padding:22px 16px}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="load-badge">⚽</div>
  <div class="load-title">Bolão Copa 2026</div>
  <div class="load-sub">Conectando...</div>
  <div class="spinner"></div>
</div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-badge">⚽</div>
      <div class="auth-title">Bolão Copa 2026</div>
      <div class="auth-sub">Série B · Pernambuco 🇧🇷</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login-btn" onclick="switchAuth('login')">Entrar</button>
      <button class="auth-tab" id="tab-reg-btn" onclick="switchAuth('register')">Criar Conta</button>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Nome de usuário</label>
        <input class="form-input" id="login-user" type="text" placeholder="ex: Milho" autocomplete="username">
        <div class="form-error" id="login-user-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="form-error" id="login-pass-err"></div>
      </div>
      <div class="form-error" id="login-global-err" style="margin-bottom:10px;font-size:12px"></div>
      <button class="btn-auth" id="btn-login" onclick="doLogin()">Entrar</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="players-hint">
        <strong>Nomes do bolão:</strong><br>
        <span class="player-tag">🌽 Milho</span>
        <span class="player-tag">🦅 Wly</span>
        <span class="player-tag">🐺 Igor</span>
        <span class="player-tag">🦁 Jucas</span>
        <span class="player-tag">⚡ Wendel</span><br>
        <span style="font-size:10px">Use exatamente seu nome do grupo para entrar no ranking.</span>
      </div>
      <div class="form-group">
        <label class="form-label">Nome de usuário</label>
        <input class="form-input" id="reg-user" type="text" placeholder="ex: Milho" autocomplete="username">
        <div class="form-error" id="reg-user-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-input" id="reg-pass" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password">
        <div class="form-error" id="reg-pass-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar senha</label>
        <input class="form-input" id="reg-pass2" type="password" placeholder="repita a senha" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
        <div class="form-error" id="reg-pass2-err"></div>
      </div>
      <div class="form-error" id="reg-global-err" style="margin-bottom:10px;font-size:12px"></div>
      <button class="btn-auth" id="btn-reg" onclick="doRegister()">Criar Conta</button>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="sync-bar" id="sync-bar"></div>
  <div class="header">
    <div class="header-inner">
      <div class="logo-wrap">
        <div class="logo-badge">⚽</div>
        <div>
          <div class="logo-title">Bolão Copa 2026</div>
          <div class="logo-sub">Série B · PE</div>
        </div>
      </div>
      <div class="user-chip" onclick="doLogout()">
        <div class="user-av" id="user-av">?</div>
        <span class="user-nm" id="user-nm-hdr">...</span>
        <span style="font-size:10px;color:var(--text2)">sair</span>
      </div>
    </div>
  </div>
  <div class="tabs">
    <div class="tabs-inner">
      <button class="tab-btn active" onclick="showTab('ranking')" id="tab-ranking">🏆 Rank</button>
      <button class="tab-btn" onclick="showTab('jogos')" id="tab-jogos">⚽ Jogos</button>
      <button class="tab-btn" onclick="showTab('palpitar')" id="tab-palpitar">✏️ Palpitar</button>
      ${currentUser?.isAdmin ? `<button class="tab-btn" onclick="showTab('admin')" id="tab-admin">⚙️ Admin</button>` : ''}
    </div>
  </div>
  <div class="main" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, update, push, get, runTransaction }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

async function hashPassword(pass) {
  const buf = await crypto.subtle.digest('SHA-256',
    new TextEncoder().encode(pass + 'bolao2026salt'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── PONTUAÇÃO ──────────────────────────────────────────────────
function calcPts(real, pal) {
  if (real?.casa == null) return null;
  const rc=+real.casa, rf=+real.fora, pc=+pal.casa, pf=+pal.fora;
  if ([rc,rf,pc,pf].some(isNaN)) return null;
  if (rc===pc && rf===pf)        return {pts:PTS.EXATO, tipo:'exact'};
  const pD=pc===pf, rD=rc===rf;
  if (pD && !rD)                 return {pts:PTS.ALMOST, tipo:'almost'};
  if (rD && pD)                  return {pts:PTS.DRAW,   tipo:'draw'};
  const rWC=rc>rf, pWC=pc>pf;
  if (rWC!==pWC)                 return {pts:0, tipo:'miss'};
  const wg=rWC?rc:rf, lg=rWC?rf:rc, pwg=pWC?pc:pf, plg=pWC?pf:pc;
  if (pwg===wg)                  return {pts:PTS.VG,   tipo:'vg'};
  if ((rc-rf)===(pc-pf))         return {pts:PTS.DIFF, tipo:'diff'};
  if (plg===lg)                  return {pts:PTS.LG,   tipo:'lg'};
  return {pts:PTS.WIN, tipo:'win'};
}

// ── DEADLINE: jogo trava na hora marcada (BRT) ─────────────────
function jogoAberto(jogo) {
  if (!jogo.data || !jogo.hora) return false;
  const s = jogo.status || 'NS';
  if (['FT','AET','PEN','1H','HT','2H','ET','BT','P','INT'].includes(s)) return false;
  // parse BRT datetime → UTC
  const [h, mi] = jogo.hora.split(':').map(Number);
  const [y, mo, d] = jogo.data.split('-').map(Number);
  // BRT = UTC-3, so kickoff UTC = BRT+3
  const kickoffUTC = Date.UTC(y, mo-1, d, h+3, mi, 0);
  return Date.now() < kickoffUTC;
}

function tempoParaJogo(jogo) {
  if (!jogo.data || !jogo.hora) return null;
  const [h, mi] = jogo.hora.split(':').map(Number);
  const [y, mo, d] = jogo.data.split('-').map(Number);
  const kickoffUTC = Date.UTC(y, mo-1, d, h+3, mi, 0);
  const diff = kickoffUTC - Date.now();
  if (diff <= 0) return null;
  const totalMin = Math.floor(diff/60000);
  const hrs = Math.floor(totalMin/60), min = totalMin%60;
  if (hrs > 48) return null; // não mostra contagem regressiva pra jogos muito longe
  if (hrs > 0) return `${hrs}h ${min}min`;
  return `${min}min`;
}

// ── RANKING ────────────────────────────────────────────────────
function computeRanking() {
  const pts={}, exact={};
  // seed known players so they always appear
  KNOWN_PLAYERS.forEach(j=>{pts[j]=0; exact[j]=0;});
  // also seed registered users
  Object.values(dbData.users||{}).forEach(u=>{
    if(!pts[u.displayName]) { pts[u.displayName]=0; exact[u.displayName]=0; }
  });
  Object.values(dbData.jogos||{}).forEach(jogo=>{
    if (jogo.resultado?.casa == null) return;
    Object.entries(jogo.palpites||{}).forEach(([jogador,p])=>{
      const r=calcPts(jogo.resultado,p);
      if(r){
        pts[jogador]=(pts[jogador]||0)+r.pts;
        if(r.tipo==='exact') exact[jogador]=(exact[jogador]||0)+1;
      }
    });
  });
  // only show players who have at least 1 palpite OR are known players
  const allPalPlayers = new Set();
  Object.values(dbData.jogos||{}).forEach(j=>Object.keys(j.palpites||{}).forEach(n=>allPalPlayers.add(n)));
  const visible = Object.entries(pts).filter(([n])=>KNOWN_PLAYERS.includes(n)||allPalPlayers.has(n));
  return {sorted: visible.sort((a,b)=>b[1]-a[1]), exact};
}

function getJogos() {
  return Object.entries(dbData.jogos||{})
    .map(([id,j])=>({...j, _id:id}))
    .sort((a,b)=>{
      const dd = a.data>b.data ? 1 : a.data<b.data ? -1 : 0;
      return dd || ((a.hora||'')>(b.hora||'') ? 1 : -1);
    });
}

window.doLogin = async () => {
  clearAuthErrors();
  const username = document.getElementById('login-user').value.trim();
  const pass     = document.getElementById('login-pass').value;
  let ok=true;
  if (!username) { document.getElementById('login-user-err').textContent='Campo obrigatório'; document.getElementById('login-user').classList.add('error'); ok=false; }
  if (!pass)     { document.getElementById('login-pass-err').textContent='Campo obrigatório'; document.getElementById('login-pass').classList.add('error'); ok=false; }
  if (!ok) return;
  const btn=document.getElementById('btn-login');
  btn.disabled=true; btn.textContent='Entrando...';
  try {
    const userKey = toKey(username);
    const snap = await get(ref(db, `bolao/users/${userKey}`));
    if (!snap.exists()) {
      document.getElementById('login-global-err').textContent='Usuário não encontrado. Crie uma conta.'; return;
    }
    const ud = snap.val();
    if (await hashPassword(pass) !== ud.passwordHash) {
      document.getElementById('login-pass-err').textContent='Senha incorreta';
      document.getElementById('login-pass').classList.add('error'); return;

    // FIX: always pull fresh isAdmin from DB, never trust localStorage
    currentUser = {username: ud.displayName, key: userKey, isAdmin: ud.isAdmin||false};
    localStorage.setItem('bolao_session', JSON.stringify(currentUser));
    bootApp();
  } catch(e) {
    document.getElementById('login-global-err').textContent='Erro de conexão. Tente novamente.';
  } finally {
    btn.disabled=false; btn.textContent='Entrar';
  }
};

// ── BOOT ───────────────────────────────────────────────────────
function bootApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-av').textContent     = currentUser.username[0].toUpperCase();
  document.getElementById('user-nm-hdr').textContent = currentUser.username;
  // Refresh isAdmin from DB (fixes stale localStorage)
  get(ref(db, `bolao/users/${currentUser.key}`)).then(snap=>{
    if (snap.exists()) {
      const freshAdmin = snap.val().isAdmin || false;
      if (freshAdmin !== currentUser.isAdmin) {
        currentUser.isAdmin = freshAdmin;
        localStorage.setItem('bolao_session', JSON.stringify(currentUser));
        updateAdminTab();
        render();
      }
    }
  });
  updateAdminTab();
  render();
  syncFromApi(true);
  clearInterval(countdownTimer);
  countdownTimer = setInterval(()=>{ if(currentTab==='palpitar') render(); }, 30000);
}

function updateAdminTab() {
  const tabsInner = document.querySelector('.tabs-inner');
  const existing  = document.getElementById('tab-admin');
  if (currentUser?.isAdmin) {
    if (!existing) {
      const btn = document.createElement('button');
      btn.className = 'tab-btn'; btn.id = 'tab-admin';
      btn.onclick = () => showTab('admin');
      btn.textContent = '\u2699\uFE0F Admin';
      tabsInner.appendChild(btn);
    }
  } else {
    if (existing) existing.remove();
    if (currentTab === 'admin') { currentTab = 'ranking'; }
  }
}

// ── API-FOOTBALL SYNC ──────────────────────────────────────────
async function syncFromApi(force=false) {
  const now=Date.now(), last=dbData.lastSync||0;
  if (!force && (now-last)<120000) return;
  setSyncBar('syncing','🔄 Buscando jogos da Copa...');
  try {
    const [nxt, pst] = await Promise.all([
      fetch(`https://v3.football.api-sports.io/fixtures?league=${WC_LEAGUE}&season=${WC_SEASON}&next=20`,
        {headers:{'x-apisports-key':API_KEY}}).then(r=>r.json()),
      fetch(`https://v3.football.api-sports.io/fixtures?league=${WC_LEAGUE}&season=${WC_SEASON}&last=30`,
        {headers:{'x-apisports-key':API_KEY}}).then(r=>r.json()),
    ]);
    const seen=new Set();
    const fixtures=[...(nxt.response||[]),...(pst.response||[])].filter(f=>{
      if(seen.has(f.fixture.id)) return false; seen.add(f.fixture.id); return true;
    });
    if (!fixtures.length) {
      setSyncBar('ok','✓ Aguardando início da Copa');
      setTimeout(()=>setSyncBar('',''), 5000); return;
    }
    let liveCount=0;
    // FIX: use runTransaction per jogo to avoid overwriting palpites written concurrently
    const writes = fixtures.map(f => {
      const fid = `api_${f.fixture.id}`;
      const s   = f.fixture.status.short;
      const isLive = ['1H','HT','2H','ET','BT','P','INT'].includes(s);
      const isDone = ['FT','AET','PEN'].includes(s);
      if (isLive) liveCount++;
      const round = f.league.round||'';
      const fase  = round
        .replace('Group Stage - ','Grupo ')
        .replace('Round of 32','Oitavas de 32')
        .replace('Round of 16','Oitavas de Final')
        .replace('Quarter-finals','Quartas de Final')
        .replace('Semi-finals','Semifinais')
        .replace('3rd Place Final','3º Lugar')
        .replace(/^Final$/,'🏆 Final');
      const utcD  = new Date(f.fixture.date);
      const brtD  = new Date(utcD.getTime() - 3*3600000);
      const data  = brtD.toISOString().substring(0,10);
      const hora  = brtD.toISOString().substring(11,16);
      // Atomic merge: only overwrite meta fields, never touch palpites
      return runTransaction(ref(db, `bolao/jogos/${fid}`), current => {
        const base = current || {};
        return {
          ...base,
          apiId: f.fixture.id,
          casa: f.teams.home.name,
          fora: f.teams.away.name,
          data, hora, fase, status: s,
          resultado: (isDone||isLive)
            ? {casa: f.goals.home, fora: f.goals.away}
            : (base.resultado || {casa:null, fora:null}),
          palpites: base.palpites || {},
        };
      });
    });
    await Promise.all(writes);
    await set(ref(db,'bolao/lastSync'), now);
    clearInterval(syncTimer);
    if (liveCount>0) {
      setSyncBar('live',`🔴 ${liveCount} jogo(s) ao vivo — atualizando a cada 2 min`);
      syncTimer=setInterval(()=>syncFromApi(true), 120000);
    } else {
      setSyncBar('ok',`✓ ${fixtures.length} jogos carregados`);
      setTimeout(()=>setSyncBar('',''), 4000);
      syncTimer=setInterval(()=>syncFromApi(false), 300000);
    }
  } catch(e) {
    console.error('Sync error:', e);
    setSyncBar('offline','⚠️ Erro ao buscar jogos da API');
    setTimeout(()=>setSyncBar('',''), 6000);
  }
}

  let h=`<div class="sec-title">🏆 Classificação</div><div class="podium-grid">`;
  sorted.slice(0,3).forEach(([n,p],i)=>{
    h+=`<div class="podium-card ${C[i]}">
      <span class="p-medal">${M[i]}</span>
      <div style="font-size:16px">${emo(n)}</div>
      <div class="p-name">${n}</div>
      <div class="p-pts">${p}</div>
      <div class="p-lbl">pts</div>
    </div>`;
  });
  h+=`</div><div class="rank-list">`;
  sorted.slice(3).forEach(([n,p],i)=>{
    h+=`<div class="rank-item">
      <span class="rank-pos">${i+4}º</span>
      <span style="font-size:16px">${emo(n)}</span>
      <span class="rank-name">${n}</span>
      <div style="text-align:right">
        <div class="rank-pts">${p}</div>
        <div style="font-size:10px;color:var(--text2)">pontos</div>
      </div>
    </div>`;
  });
  h+=`</div><div class="vidente-box">
    <div class="vidente-title">⭐ Prêmio Vidente 🔮 <span style="font-size:10px;font-weight:400;color:var(--text2)">(mais placares exatos)</span></div>`;
  const vid=Object.entries(exact).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if (!vid.length) h+=`<div style="color:var(--text2);font-size:12px">Nenhum placar exato ainda.</div>`;
  vid.forEach(([n,c],i)=>{
    h+=`<div class="vidente-item">
      <span style="font-weight:600;font-size:13px">${['🥇','🥈','🥉'][i]||''} ${emo(n)} ${n}</span>
      <div style="display:flex;align-items:baseline;gap:3px">
        <span class="vidente-count">${c}</span>
        <span style="font-size:10px;color:var(--text2)">exatos</span>
      </div>
    </div>`;
  });
  h+=`</div><div class="pts-legend">
    <div class="pts-legend-title">📋 Sistema de Pontuação</div>
    <div class="pts-grid">`;
  [
    ['Placar exato','25pts','pts-exact'],
    ['Vencedor + gols do vencedor','18pts','pts-vg'],
    ['Vencedor + diferença de gols','15pts','pts-diff'],
    ['Empate correto','15pts','pts-draw'],
    ['Vencedor + gols do perdedor','12pts','pts-lg'],
    ['Acertou o vencedor','10pts','pts-win'],
    ['Previu empate (mas não foi)','4pts','pts-almost'],
    ['Errou tudo','0pts','pts-zero'],
  ].forEach(([l,p,c])=>{
    h+=`<div class="pts-row"><span>${l}</span><span class="${c}" style="font-weight:700;white-space:nowrap">${p}</span></div>`;
  });
  h+=`</div></div>`;
  return h;
}

  const jogos=getJogos();
  const fases=['Todos',...new Set(jogos.map(j=>j.fase))];
  let h=`<div class="sec-title">⚽ Jogos da Copa</div><div class="filter-bar">`;
  fases.forEach(f=>{
    h+=`<button class="filter-btn ${filterFase===f?'active':''}" onclick="setFilter('${f}')">${f}</button>`;
  });
  h+=`</div>`;
  const list = filterFase==='Todos' ? jogos : jogos.filter(j=>j.fase===filterFase);
  if (!list.length) { h+=`<div class="empty">Nenhum jogo disponível.<br>Sincronize com a API no Admin.</div>`; return h; }
  list.forEach(jogo=>{
    const s=jogo.status||'NS';
    const isLive=['1H','HT','2H','ET','BT','P','INT'].includes(s);
    const isDone=['FT','AET','PEN'].includes(s);
    const temRes = isDone || (jogo.resultado?.casa != null);
    const aberto = jogoAberto(jogo);
    const badge  = isLive ? `<span class="badge badge-live"><span class="live-dot"></span>AO VIVO</span>`
                 : isDone ? `<span class="badge badge-enc">✓ Encerrado</span>`
                 : aberto ? `<span class="badge badge-pend">Aberto</span>`
                 :          `<span class="badge badge-fechado">🔒 Fechado</span>`;
    const c = temRes ? jogo.resultado.casa : '-';
    const f = temRes ? jogo.resultado.fora : '-';
    h+=`<div class="match-card">
      <div class="match-hdr">
        <span class="match-date">📅 ${fmtDate(jogo.data)} · ${fmtTime(jogo.hora)}</span>
        <div style="display:flex;gap:5px;align-items:center">
          <span class="match-stage">${jogo.fase}</span>${badge}
        </div>
      </div>
      <div class="match-body">
        <div class="scoreboard">
          <div class="team-info"><div class="team-flag">${flag(jogo.casa)}</div><div class="team-name">${jogo.casa}</div></div>
          <div class="score-box">
            <div class="score-num">${c}</div>
            <div class="score-div">x</div>
            <div class="score-num">${f}</div>
          </div>
          <div class="team-info"><div class="team-flag">${flag(jogo.fora)}</div><div class="team-name">${jogo.fora}</div></div>
        </div>
      </div>`;
    const pals=Object.entries(jogo.palpites||{});
    if (pals.length) {
      h+=`<div class="match-pals"><div class="pals-title">📝 Palpites</div><div class="pals-grid">`;
      pals.forEach(([jogador,p])=>{
        const r = temRes ? calcPts(jogo.resultado,p) : null;
        h+=`<div class="pal-item">
          <span class="pal-player">${emo(jogador)} ${jogador}</span>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
            <span class="pal-score">${p.casa}x${p.fora}</span>
            ${r ? `<span style="font-size:10px" class="${ptsClass(r.tipo)}">${ptsLabel(r.tipo)} ${r.pts}pts</span>` : ''}
          </div>
        </div>`;
      });
      h+=`</div></div>`;
    }
    h+=`</div>`;
  });
  return h;
}

// ── PALPITAR ───────────────────────────────────────────────────
function renderPalpitar() {
  // FIX: use jogoAberto() for correct deadline check
  const jogos = getJogos();
  const abertos  = jogos.filter(j=>jogoAberto(j));
  const fechados  = jogos.filter(j=>{
    const s=j.status||'NS';
    return !['FT','AET','PEN'].includes(s) && !jogoAberto(j);
  });

  let h=`<div class="sec-title">✏️ Meus Palpites</div>`;

  if (!abertos.length && !fechados.length) {
    h+=`<div class="empty">✅ Todos os jogos já encerraram.<br>Novos jogos aparecem aqui automaticamente.</div>`;
    return h;
  }

  // Jogos ainda abertos para palpite
  if (abertos.length) {
    abertos.forEach(jogo=>{
      const meu = (jogo.palpites||{})[currentUser.username];
      const tempo = tempoParaJogo(jogo);
      h+=`<div class="palpitar-card">
        <div class="pal-hdr">
          <span style="font-weight:600;font-size:11px;color:var(--gold)">${jogo.fase}</span>
          <span style="font-size:10px;color:var(--text2)">📅 ${fmtDate(jogo.data)} · ${fmtTime(jogo.hora)}</span>
        </div>
        <div class="pal-match-row">
          <div class="pal-team"><div class="pal-flag">${flag(jogo.casa)}</div><div class="pal-name">${jogo.casa}</div></div>
          <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text2)">VS</span>
          <div class="pal-team"><div class="pal-flag">${flag(jogo.fora)}</div><div class="pal-name">${jogo.fora}</div></div>
        </div>
        <div class="my-pal-section">
          <div class="my-pal-label">${emo(currentUser.username)} ${currentUser.username} — seu palpite</div>
          <div class="my-pal-row">
            <input class="sc-in" type="number" min="0" max="20" placeholder="0" id="pc_${jogo._id}" value="${meu!=null?meu.casa:''}">
            <span class="sc-x">x</span>
            <input class="sc-in" type="number" min="0" max="20" placeholder="0" id="pf_${jogo._id}" value="${meu!=null?meu.fora:''}">
            <button class="btn-salvar" onclick="salvarPalpite('${jogo._id}')">Salvar</button>
            ${tempo ? `<span class="countdown">⏳ ${tempo}</span>` : ''}
          </div>
          ${meu!=null ? `<div style="font-size:10px;color:var(--text2);margin-top:6px">✅ Palpite atual: <strong>${meu.casa}x${meu.fora}</strong></div>` : ''}
        </div>
      </div>`;
    });
  }

  // Jogos com palpite fechado (ainda não encerrados mas passaram do horário)
  if (fechados.length) {
    h+=`<div style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:#c084fc;letter-spacing:1px;margin:16px 0 8px">🔒 Palpites Fechados</div>`;
    fechados.forEach(jogo=>{
      const meu=(jogo.palpites||{})[currentUser.username];
      h+=`<div class="palpitar-card" style="opacity:.75">
        <div class="pal-hdr">
          <span style="font-weight:600;font-size:11px;color:#c084fc">${jogo.fase}</span>
          <span style="font-size:10px;color:var(--text2)">📅 ${fmtDate(jogo.data)} · ${fmtTime(jogo.hora)}</span>
        </div>
        <div class="pal-match-row">
          <div class="pal-team"><div class="pal-flag">${flag(jogo.casa)}</div><div class="pal-name">${jogo.casa}</div></div>
          <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text2)">VS</span>
          <div class="pal-team"><div class="pal-flag">${flag(jogo.fora)}</div><div class="pal-name">${jogo.fora}</div></div>
        </div>
        <div class="my-pal-section">
          ${meu!=null
            ? `<div style="font-size:12px;color:var(--text2)">✅ Seu palpite: <strong style="color:var(--text)">${meu.casa}x${meu.fora}</strong></div>`
            : `<div class="locked-msg">🔒 Prazo encerrado — palpite não registrado</div>`
          }
        </div>
      </div>`;
    });
  }

  return h;
}

// ── ADMIN ──────────────────────────────────────────────────────
function renderAdmin() {
  const isAdmin = currentUser?.isAdmin;

  if (!isAdmin) {
    return `
      <div style="text-align:center;padding:48px 20px">
        <div style="font-size:64px;margin-bottom:16px">🚨</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--red);letter-spacing:2px;margin-bottom:8px">
          ÁREA RESTRITA
        </div>
        <div style="font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.7">
          Ei, <strong style="color:var(--text)">${currentUser.username}</strong>! Tentando espiar o admin? 👀<br>
          Isso aqui é só pra quem manda, seu viadão pretão.<br>
          <span style="font-size:12px">Volta pro seu palpite antes que alguém te veja.</span>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);letter-spacing:1px;margin-bottom:20px">
          🔒 Acesso negado. Tchonga.
        </div>
        <button class="btn-salvar" onclick="showTab('palpitar')">✏️ Ir Palpitar</button>
      </div>`;
  }

  let h=`<div class="sec-title">⚙️ Admin</div>`;

  // Sync status
  const ls = dbData.lastSync
    ? new Date(dbData.lastSync).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
    : 'nunca';
  h+=`<div class="admin-box">
    <div class="admin-box-title">🔄 Sincronização com API</div>
    <div style="font-size:12px;color:var(--text2);background:var(--surface2);border-radius:7px;padding:10px 12px;line-height:1.7">
      <strong style="color:var(--text)">Última sync:</strong> ${ls} &nbsp;·&nbsp;
      <strong style="color:var(--text)">Jogos no banco:</strong> ${Object.keys(dbData.jogos||{}).length}
    </div>
    <div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap">
      <button class="btn-sm" onclick="forcSync()">🔄 Sincronizar agora</button>
      ${isAdmin ? `<button class="btn-danger" onclick="if(confirm('Apagar todos os jogos e palpites?'))zerarTudo()">🗑️ Zerar tudo</button>` : ''}
    </div>
  </div>`;

  if (isAdmin) {
    // Inserir resultado manual
    const semRes = getJogos().filter(j=>!['FT','AET','PEN'].includes(j.status||'NS'));
    if (semRes.length) {
      h+=`<div class="admin-box"><div class="admin-box-title">📝 Inserir Resultado Manual</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:10px">Use para corrigir ou adiantar resultado antes da API atualizar.</div>`;
      semRes.slice(0,15).forEach(jogo=>{
        h+=`<div class="res-row">
          <div class="res-match-name">${flag(jogo.casa)} ${jogo.casa} x ${jogo.fora} ${flag(jogo.fora)}
            <span style="color:var(--text2);font-weight:400"> — ${fmtDate(jogo.data)} · ${jogo.fase}</span>
          </div>
          <div class="res-inputs">
            <span class="res-team">${jogo.casa}</span>
            <input class="res-in" type="number" min="0" max="20" placeholder="0" id="rc_${jogo._id}">
            <span class="res-x">x</span>
            <input class="res-in" type="number" min="0" max="20" placeholder="0" id="rf_${jogo._id}">
            <span class="res-team">${jogo.fora}</span>
            <button class="btn-sm" onclick="salvarRes('${jogo._id}')">Salvar</button>
          </div>
        </div>`;
      });
      h+=`</div>`;
    }

    // Resultados registrados
    const comRes = getJogos().filter(j=>j.resultado?.casa!=null);
    if (comRes.length) {
      h+=`<div class="admin-box"><div class="admin-box-title">✅ Resultados Registrados</div>`;
      comRes.forEach(jogo=>{
        h+=`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:7px;padding:8px 11px;margin-bottom:5px;flex-wrap:wrap;gap:6px">
          <div>
            <span style="font-weight:600;font-size:12px">${flag(jogo.casa)} ${jogo.casa} ${jogo.resultado.casa}x${jogo.resultado.fora} ${jogo.fora} ${flag(jogo.fora)}</span>
            <span style="font-size:10px;color:var(--text2);display:block">${fmtDate(jogo.data)} · ${jogo.fase}</span>
          </div>
          <button class="btn-danger" onclick="resetRes('${jogo._id}')">✏️ Editar</button>
        </div>`;
      });
      h+=`</div>`;
    }
  }

  // Usuários
  const users = Object.entries(dbData.users||{});
  h+=`<div class="admin-box"><div class="admin-box-title">👥 Usuários (${users.length})</div>`;
  if (!users.length) h+=`<div style="color:var(--text2);font-size:12px">Nenhum usuário cadastrado.</div>`;
  users.sort((a,b)=>a[0]>b[0]?1:-1).forEach(([key,u])=>{
    const isMe = key===currentUser.key;
    h+=`<div class="user-list-item">
      <div>
        <span class="user-list-name">${emo(u.displayName)} ${u.displayName}
          ${isMe ? '<span style="font-size:10px;color:var(--text2)"> (você)</span>' : ''}
        </span>
        <span class="user-list-meta">Desde ${new Date(u.createdAt).toLocaleDateString('pt-BR')}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        ${u.isAdmin ? `<span class="admin-badge">Admin</span>` : ''}
        ${isAdmin && !isMe && !u.isAdmin ? `<button class="btn-sm" style="font-size:10px;padding:4px 9px" onclick="toggleAdmin('${key}',true)">+Admin</button>` : ''}
        ${isAdmin && !isMe && u.isAdmin  ? `<button class="btn-danger" style="padding:4px 9px;font-size:10px" onclick="toggleAdmin('${key}',false)">−Admin</button>` : ''}
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Alterar senha
  h+=`<div class="admin-box"><div class="admin-box-title">🔑 Alterar Minha Senha</div>
    <div class="form-grid" style="gap:8px">
      <div class="form-group-admin full">
        <label class="form-label-admin">Nova Senha</label>
        <input class="form-input-admin" type="password" id="new-pass" placeholder="mínimo 6 caracteres">
      </div>
      <div class="form-group-admin full">
        <label class="form-label-admin">Confirmar Nova Senha</label>
        <input class="form-input-admin" type="password" id="new-pass2" placeholder="repita">
      </div>
    </div>
    <button class="btn-sm" style="margin-top:10px" onclick="changePassword()">🔑 Alterar Senha</button>
  </div>`;

  return h;
}

// ── ACTIONS ────────────────────────────────────────────────────
window.forcSync = async () => { showToast('Sincronizando...'); await syncFromApi(true); };

window.salvarPalpite = async id => {
  // FIX: double-check deadline server-side via jogo data
  const jogo = Object.values(dbData.jogos||{}).find(j=>`api_${j.apiId}`===id || Object.entries(dbData.jogos||{}).find(([k])=>k===id)?.[0]===id);
  // find jogo by _id
  const jogoEntry = Object.entries(dbData.jogos||{}).find(([k])=>k===id);
  if (jogoEntry && !jogoAberto({...jogoEntry[1], _id:jogoEntry[0]})) {
    showToast('⏰ Prazo encerrado para este jogo!', true); return;
  }
  const c = document.getElementById(`pc_${id}`)?.value;
  const f = document.getElementById(`pf_${id}`)?.value;
  if (c===''||f==='') { showToast('Preencha os dois placares!', true); return; }
  if (+c<0||+f<0||+c>20||+f>20) { showToast('Placar inválido!', true); return; }
  await update(ref(db, `bolao/jogos/${id}/palpites/${currentUser.username}`), {casa:+c, fora:+f});
  showToast(`Palpite salvo! ${c}x${f} ✅`);
};

window.salvarRes = async id => {
  const c = document.getElementById(`rc_${id}`)?.value;
  const f = document.getElementById(`rf_${id}`)?.value;
  if (c===''||f==='') { showToast('Preencha o placar!', true); return; }
  await update(ref(db, `bolao/jogos/${id}/resultado`), {casa:+c, fora:+f});
  await update(ref(db, `bolao/jogos/${id}`), {status:'FT'});
  showToast('Resultado salvo! 🎯');
};

window.resetRes = async id => {
  await update(ref(db, `bolao/jogos/${id}/resultado`), {casa:null, fora:null});
  await update(ref(db, `bolao/jogos/${id}`), {status:'NS'});
  showToast('Resultado removido para edição.');
};

window.toggleAdmin = async (key, makeAdmin) => {
  await update(ref(db, `bolao/users/${key}`), {isAdmin: makeAdmin});
  showToast(makeAdmin ? 'Admin concedido! 🔑' : 'Admin removido.');
};

window.changePassword = async () => {
  const p1 = document.getElementById('new-pass')?.value;
  const p2 = document.getElementById('new-pass2')?.value;
  if (!p1||p1.length<6) { showToast('Mínimo 6 caracteres!', true); return; }
  if (p1!==p2)          { showToast('Senhas não coincidem!', true); return; }
  const hash = await hashPassword(p1);
  await update(ref(db, `bolao/users/${currentUser.key}`), {passwordHash: hash});
  showToast('Senha alterada! ✅');
  document.getElementById('new-pass').value='';
  document.getElementById('new-pass2').value='';
};

window.zerarTudo = async () => {
  await set(ref(db,'bolao/jogos'), {});
  await set(ref(db,'bolao/lastSync'), null);
  showToast('Dados zerados.');
};

// ── INIT ───────────────────────────────────────────────────────
startListening();
setTimeout(()=>{
  document.getElementById('loading-screen').style.display='none';
  const sess = localStorage.getItem('bolao_session');
  if (sess) {
    try {
      currentUser = JSON.parse(sess);
      bootApp();
    } catch { localStorage.removeItem('bolao_session'); }
  }
  if (!currentUser) document.getElementById('auth-screen').style.display='flex';
}, 1200);
</script>
</body>
</html>
